version: '3.8'

services:
  # --- FRONTEND ---
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://proximarkt.francecentral.cloudapp.azure.com/api
    container_name: proximarkt-frontend
    restart: always
    networks:
      - proxy_net
    labels:
      - "traefik.enable=true"
      # FUERZA A TRAEFIK A USAR ESTA RED
      - "traefik.docker.network=proxy_net"
      - "traefik.http.routers.frontend.rule=Host(`proximarkt.francecentral.cloudapp.azure.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=myresolver"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  # --- BACKEND ---
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: proximarkt-backend
    restart: always
    env_file: ../backend/.env 
    volumes:
      - backend_storage:/var/www/html/storage
    networks:
      - proxy_net
      - backend_net
    labels:
      - "traefik.enable=true"
      # FUERZA A TRAEFIK A USAR ESTA RED
      - "traefik.docker.network=proxy_net"
      - "traefik.http.routers.backend.rule=Host(`proximarkt.francecentral.cloudapp.azure.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=myresolver"
      - "traefik.http.routers.backend.priority=10"
      - "traefik.http.services.backend.loadbalancer.server.port=9000"

  # --- DB ---
  db:
    image: mysql:8.0
    container_name: proximarkt-db
    restart: always
    environment:
      MYSQL_DATABASE: proximarkt
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password_seguro}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend_net

networks:
  proxy_net:
    external: true
  backend_net:
    driver: bridge

volumes:
  db_data:
  backend_storage: