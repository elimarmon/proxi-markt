version: '3.8'

services:
  # --- FRONTEND (Nginx + Vue) ---
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://proximarkt.francecentral.cloudapp.azure.com/api
    container_name: proximarkt-frontend
    restart: always
    networks:
      - proxy_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_net"
      - "traefik.http.routers.frontend.rule=Host(`proximarkt.francecentral.cloudapp.azure.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=myresolver"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  # --- BACKEND (Laravel PHP-FPM) ---
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: proximarkt-backend
    restart: always
    env_file: ../backend/.env 
    volumes:
      - backend_storage:/var/www/html/storage
    networks:
      - proxy_net
      - backend_net

  # --- BASE DE DATOS ---
  mysql:
    image: mysql:8.0
    container_name: proximarkt-db
    restart: always
    environment:
      MYSQL_DATABASE: proxi_markt
      MYSQL_ROOT_PASSWORD: root_password_seguro
      MYSQL_USER: alumno
      MYSQL_PASSWORD: alumno  # <--- Coincide con tu .env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend_net

networks:
  proxy_net:
    external: true
  backend_net:
    driver: bridge

volumes:
  db_data:
  backend_storage: