version: '3.8'

services:
  # Base de Datos
  mysql:
    container_name: proximarkt-mysql
    image: mysql:8.0
    restart: always
    command: --default-authentication-plugin=mysql_native_password --log-bin-trust-function-creators=1
    environment:
      - MYSQL_DATABASE=proxi_markt
      - MYSQL_USER=alumno
      - MYSQL_PASSWORD=alumno
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - mysql_data:/var/lib/mysql
      # IMPORTANTE: Mapeo de tu script SQL para inicializar tablas
      - ../docker/database/base.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - proximarkt-network

  # Backend (Laravel)
  backend:
    container_name: proximarkt-backend
    build:
      context: ..
      dockerfile: docker/php/Dockerfile
    restart: always
    volumes:
      - ../backend:/var/www/html
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      - mysql
    networks:
      - proximarkt-network

  # Frontend + Servidor Web (Nginx)
  nginx:
    container_name: proximarkt-nginx
    image: nginx:stable-alpine
    restart: always
    volumes:
      - ../backend:/var/www/html:ro
      - ../docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - proximarkt-network
    # Configuración para Traefik (Dominio y SSL)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.proximarkt.rule=Host(`proximarkt.francecentral.cloudapp.azure.com`)"
      - "traefik.http.routers.proximarkt.entrypoints=websecure"
      - "traefik.http.routers.proximarkt.tls.certresolver=myresolver"

networks:
  proximarkt-network:
    external: true # Usamos la red que ya creó Traefik

volumes:
  mysql_data: