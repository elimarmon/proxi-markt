version: '3.8'

services:
  # BACKEND
  api:
    build: ./api
    container_name: proximarkt-api
    restart: always
    env_file: ./api/.env
    volumes:
      - ./api:/var/www/html # Montaje para desarrollo, quítalo si es producción pura
      - api_storage:/var/www/html/storage
    networks:
      - proxy_net
      - internal_db

  # FRONTEND
  client:
    build: 
      context: ./client
      args:
        - VITE_API_URL=https://proximarkt.francecentral.cloudapp.azure.com/api
    container_name: proximarkt-client
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`proximarkt.francecentral.cloudapp.azure.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=myresolver"
    networks:
      - proxy_net

  # BASE DE DATOS
  db:
    image: mysql:8.0
    container_name: proximarkt-db
    environment:
      MYSQL_DATABASE: proximarkt
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal_db

networks:
  proxy_net:
    external: true
  internal_db:
    driver: bridge

volumes:
  db_data:
  api_storage: