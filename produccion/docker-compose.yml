version: '3.8'

services:
  # Base de Datos MySQL
  mysql:
    container_name: proximarkt-mysql
    image: mysql:8.0
    restart: always
    command: --default-authentication-plugin=mysql_native_password --log-bin-trust-function-creators=1
    environment:
      - MYSQL_DATABASE=proxi_markt
      - MYSQL_USER=alumno
      - MYSQL_PASSWORD=alumno
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - mysql_data:/var/lib/mysql
      # Mapeo del script SQL para inicializar tablas automáticamente
      - ../docker/database/base.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - proxy_net

  # Backend (Laravel PHP-FPM)
  backend:
    container_name: proximarkt-backend
    build:
      context: ..
      dockerfile: docker/php/Dockerfile
    restart: always
    volumes:
      - ../backend:/var/www/html
    depends_on:
      - mysql
    networks:
      - proxy_net

  # Servidor Web (Nginx) - Este es el que se comunica con Traefik
  nginx:
    container_name: proximarkt-nginx
    image: nginx:stable-alpine
    restart: always
    volumes:
      - ../backend:/var/www/html:ro
      - ../docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - proxy_net
    # Configuración de Etiquetas para Traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.proximarkt.rule=Host(`proximarkt.francecentral.cloudapp.azure.com`)"
      - "traefik.http.routers.proximarkt.entrypoints=websecure"
      - "traefik.http.routers.proximarkt.tls.certresolver=myresolver"
      - "traefik.http.services.proximarkt.loadbalancer.server.port=80"

networks:
  # Definimos la red de Traefik como externa
  proxy_net:
    external: true

volumes:
  mysql_data: