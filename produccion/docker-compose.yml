version: '3.8'

services:
  # --- FRONTEND (Nginx + Vue) ---
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://proximarkt.francecentral.cloudapp.azure.com/api
    container_name: proximarkt-frontend
    restart: always
    networks:
      - proxy_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_net"
      - "traefik.http.routers.frontend.rule=Host(`proximarkt.francecentral.cloudapp.azure.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=myresolver"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  # --- BACKEND (Laravel PHP-FPM) ---
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: proximarkt-backend
    restart: always
    env_file: ../backend/.env 
    volumes:
      - backend_storage:/var/www/html/storage
    networks:
      - proxy_net
      - backend_net

  # --- BASE DE DATOS (Cambiado de 'db' a 'mysql') ---
  mysql:
    image: mysql:8.0
    container_name: proximarkt-db
    restart: always
    environment:
      # Asegúrate de que este nombre de DB coincida con tu .env
      MYSQL_DATABASE: proximarkt
      # Si en tu .env usas DB_PASSWORD, aquí debe ir igual
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password_seguro}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend_net

networks:
  proxy_net:
    external: true
  backend_net:
    driver: bridge

volumes:
  db_data:
  backend_storage: