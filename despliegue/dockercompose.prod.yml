version: '3.8'

services:
  # --- TRAEFIK ---
  traefik:
    image: traefik:v2.10
    container_name: traefik
    restart: unless-stopped
    # --- AÑADE ESTO ---
    environment:
      - DOCKER_API_VERSION=1.24
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=tu-davcamure@alu.edu.gva.es"
      - "--certificatesresolvers.myresolver.acme.storage=/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./acme.json:/acme.json"
    networks:
      - proxy-net

  # --- MYSQL ---
  mysql:
    image: mysql:8.0
    container_name: proximarkt_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - ../docker/database/.env.database
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal-net

  # --- PHP ---
  php:
    build:
      context: ..
      dockerfile: despliegue/Dockerfile.prod
    container_name: proximarkt_php
    restart: unless-stopped
    env_file: ../docker/.env.app
    volumes:
      # IMPORTANTE: Mantenemos esto, pero hay que borrar el volumen antiguo
      - php_assets:/var/www/html
      - ./storage_data:/var/www/html/storage/app/public
    networks:
      - internal-net

  # --- NGINX ---
  nginx:
    image: nginx:stable-alpine
    container_name: proximarkt_nginx
    restart: unless-stopped
    volumes:
      - ./prod.conf:/etc/nginx/conf.d/default.conf
      - php_assets:/var/www/html:ro
    depends_on:
      - php
    networks:
      - internal-net
      - proxy-net
    labels:
      - "traefik.enable=true"
      # Usamos comillas simples para evitar problemas de sintaxis
      - "traefik.http.routers.proximarkt.rule=Host('proximarkt.francecentral.cloudapp.azure.com')"
      - "traefik.http.routers.proximarkt.entrypoints=websecure"
      - "traefik.http.routers.proximarkt.tls.certresolver=myresolver"
      - "traefik.http.services.proximarkt-svc.loadbalancer.server.port=80"
      - "traefik.http.routers.proximarkt.service=proximarkt-svc"
      # Le decimos a Traefik explícitamente qué red usar para encontrar a nginx
      - "traefik.docker.network=despliegue_proxy-net"

volumes:
  mysql_data:
  php_assets:
  acme_data:

networks:
  proxy-net:
  internal-net: