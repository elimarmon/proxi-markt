services:
  # Traefik es la puerta de entrada pública: recibe peticiones HTTP/HTTPS,
  # gestiona certificados TLS y reenvía tráfico al servicio nginx.
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.44
    command:
      - "--providers.docker=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=tu-correo@alu.edu.gva.es"
      - "--certificatesresolvers.myresolver.acme.storage=/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./acme.json:/acme.json"
    networks:
      - proxy-net

  # MySQL guarda los datos de la aplicación.
  # base.sql se ejecuta al inicializar un volumen nuevo.
  mysql:
    image: mysql:8.0
    container_name: proximarkt_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - ../docker/database/.env.database
    volumes:
      - mysql_data:/var/lib/mysql
      - ../docker/database/base.sql:/docker-entrypoint-initdb.d/01-base.sql:ro
    networks:
      - internal-net

  # php-fpm ejecuta Laravel (API y lógica de negocio).
  php:
    build:
      context: ..
      dockerfile: despliegue/Dockerfile.prod
    container_name: proximarkt_php
    restart: unless-stopped
    env_file: ../docker/.env.app
    volumes:
      # Monta el repositorio para que php acceda al backend en /var/www/html/backend.
      - ..:/var/www/html
    networks:
      - internal-net

  # Nginx sirve la SPA y reenvía /api al contenedor php.
  nginx:
    image: nginx:stable-alpine
    container_name: proximarkt_nginx
    restart: unless-stopped
    volumes:
      # Carga la configuración de Nginx para producción.
      - ./prod.conf:/etc/nginx/conf.d/default.conf
      # Monta el repositorio en solo lectura para servir frontend/dist y backend/public.
      - ..:/var/www/html:ro
    depends_on:
      - php
    networks:
      - internal-net
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=despliegue_proxy-net"
      - "traefik.http.routers.proximarkt.rule=Host(`proximarkt.francecentral.cloudapp.azure.com`)"
      - "traefik.http.routers.proximarkt.entrypoints=websecure"
      - "traefik.http.routers.proximarkt.tls.certresolver=myresolver"
      - "traefik.http.services.proximarkt-svc.loadbalancer.server.port=80"

volumes:
  mysql_data:

networks:
  proxy-net:
  internal-net:
