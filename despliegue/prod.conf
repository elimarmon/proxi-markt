server {
    listen 80;
    server_name proximarkt.francecentral.cloudapp.azure.com;
    index index.html;

    # --- FRONTEND ---
    # Apuntamos a la carpeta que SI existe en tu máquina
    root /var/www/html/frontend/dist;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- BACKEND (API) ---
    location /api {
        # Al usar alias, apuntamos a la carpeta public de Laravel
        alias /var/www/html/backend/public;
        try_files $uri $uri/ @laravel;

        location ~ \.php$ {
            fastcgi_pass php:9000;
            include fastcgi_params;
            # Importante: aquí usamos el alias para encontrar el index.php
            fastcgi_param SCRIPT_FILENAME /var/www/html/backend/public/index.php;
        }
    }

    location @laravel {
        rewrite ^/api/(.*)$ /api/index.php?/$1 last;
    }
}