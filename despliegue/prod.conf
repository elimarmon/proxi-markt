server {
    listen 80;
    server_name proximarkt.francecentral.cloudapp.azure.com;
    
    # 1. ESTO EVITA QUE SE QUEDE PENSANDO: Definimos dónde está el frontend
    root /var/www/html/frontend/dist;
    index index.html;

    # --- FRONTEND ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- BACKEND (API) ---
    location /api {
        # Esto hace que Nginx no busque un fichero, sino que salte directo a Laravel
        rewrite ^/api/(.*)$ /index.php?/$1 last;
    }

    # --- PROCESAMIENTO PHP ---
    location ~ \.php$ {
        fastcgi_pass php:9000;
        include fastcgi_params;
        
        # Ruta física al index.php de Laravel
        fastcgi_param SCRIPT_FILENAME /var/www/html/backend/public/index.php;
        
        # Pasamos la ruta para que api.php la reconozca
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param SCRIPT_NAME /index.php;
    }
}