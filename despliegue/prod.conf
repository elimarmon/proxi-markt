server {
    listen 80;
    server_name proximarkt.francecentral.cloudapp.azure.com;
    
    # 1. ESTO EVITA QUE SE QUEDE PENSANDO: Definimos dónde está el frontend
    root /var/www/html/frontend/dist;
    index index.html;

    # --- FRONTEND ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- BACKEND (API) ---
    location ^~ /api {
        # Cualquier ruta /api se envía al front controller de Laravel
        try_files $uri $uri/ /backend/public/index.php?$query_string;
    }

    # --- PROCESAMIENTO PHP ---
    location ~ ^/backend/public/index\.php$ {
        fastcgi_pass php:9000;
        include fastcgi_params;

        # Front controller real de Laravel
        fastcgi_param SCRIPT_FILENAME /var/www/html/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/backend/public;
        internal;
    }
}
