server {
    listen 80;
    server_name proximarkt.francecentral.cloudapp.azure.com;
    index index.html;

    # --- FRONTEND (VUE) ---
    # Nginx sirve directamente los archivos estáticos de la carpeta dist
    root /var/www/html/frontend/dist;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- BACKEND (LARAVEL API) ---
    location /api {
        # Obligamos a Nginx a ignorar el disco y saltar al bloque de PHP
        # Todo lo que entre por /api/algo se convierte en index.php?/algo
        rewrite ^/api/(.*)$ /index.php?/$1 last;
    }

    # --- PROCESAMIENTO PHP ---
    # Este bloque captura las peticiones redirigidas por el rewrite anterior
    location ~ \.php$ {
        fastcgi_pass php:9000;
        include fastcgi_params;
        
        # DEFINICIÓN CRÍTICA:
        # Le decimos a PHP-FPM que el "cerebro" está en el public/index.php del backend
        fastcgi_param SCRIPT_FILENAME /var/www/html/backend/public/index.php;
        
        # Pasamos la URI original para que el router de Laravel (api.php) sepa qué ruta se pidió
        fastcgi_param REQUEST_URI $request_uri;
        
        # Evitamos que Laravel se confunda con el nombre del script
        fastcgi_param SCRIPT_NAME /index.php;
    }

    # Impedir acceso a archivos .ht (Seguridad)
    location ~ /\.ht {
        deny all;
    }
}