server {
    # Servidor HTTP interno; Traefik publica HTTPS y reenvía aquí.
    listen 80;
    server_name proximarkt.francecentral.cloudapp.azure.com;
    root /var/www/html/backend/public;
    index index.php index.html;

    # Rutas de API: envía todo /api al front controller de Laravel.
    location ^~ /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Ficheros de storage público de Laravel (imágenes subidas).
    location ^~ /storage/ {
        alias /var/www/html/backend/public/storage/;
        try_files $uri =404;
    }

    # Rutas web: sirve la SPA de Vue desde frontend/dist.
    location / {
        root /var/www/html/frontend/dist;
        index index.html;
        try_files $uri /index.html;
    }

    # Único PHP ejecutable: index.php de Laravel (evita ejecutar otros .php).
    location = /index.php {
        fastcgi_pass php:9000;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME /var/www/html/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/backend/public;
        internal;
    }

    # Cualquier otro archivo .php devuelve 404 por seguridad.
    location ~ \.php$ {
        return 404;
    }
}
