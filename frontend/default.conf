server {
    listen 80;
    server_name localhost;

    # Directorio donde están los archivos de tu frontend (Vue/Vite)
    root /usr/share/nginx/html;
    index index.html;

    # --- CONFIGURACIÓN PARA EL FRONTEND (SPA) ---
    location / {
        # Esta línea es la clave:
        # 1. Mira si existe el archivo ($uri)
        # 2. Mira si existe la carpeta ($uri/)
        # 3. Si no existe nada de lo anterior (como en /auth), envía a index.html
        try_files $uri $uri/ /index.html;
    }

    # --- CONFIGURACIÓN PARA LA API (LARAVEL) ---
    location /api {
        # Si la petición es /api/login, esto lo convierte en /login para Laravel
        rewrite ^/api/(.*)$ /$1 break;

        # Protocolo FastCGI para hablar con PHP-FPM
        include fastcgi_params;
        fastcgi_pass proximarkt-backend:9000;
        
        # Ruta del index.php DENTRO del contenedor backend
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;

        # Pasar headers de HTTPS para que Laravel no se queje
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
    }

    # Bloquear acceso a archivos sensibles
    location ~ /\.(?!well-known).* {
        deny all;
    }
}