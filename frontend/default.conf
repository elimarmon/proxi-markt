server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # CONFIGURACIÓN PARA LARAVEL (PHP-FPM)
    location /api {
        # Eliminamos el "/" extra para que Laravel reciba la ruta bien
        rewrite ^/api/(.*)$ /$1 break;

        # IMPORTANTE: Usamos fastcgi_pass y el nombre del contenedor backend
        fastcgi_pass proximarkt-backend:9000;
        include fastcgi_params;
        
        # Le decimos a PHP dónde está el archivo de entrada de Laravel
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        
        # Headers necesarios para que Laravel sepa que viene de HTTPS (Traefik)
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
    }
}