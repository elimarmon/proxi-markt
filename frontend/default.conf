server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        # 1. Quita proxy_pass y usa fastcgi_pass
        # 2. Usa el nombre exacto: proximarkt-backend
        fastcgi_pass proximarkt-backend:9000;
        
        include fastcgi_params;
        
        # 3. Dile a PHP qué archivo ejecutar (el index.php de Laravel)
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
    }
}